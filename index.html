<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Checklist por Assunto</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
	<style>
	:root {
		/* surfaces */
		--void: #050712;
		--bg: #0b1021;
		--card: #0f172a;
		--card-2: #0d1428;
		--stroke: #1c2541;
		--stroke-soft: rgba(255, 255, 255, 0.06);
		--surface-1: rgba(255, 255, 255, 0.03);
		--surface-2: rgba(255, 255, 255, 0.05);

		/* text */
		--text: #f5f7ff;
		--muted: #8ea0c2;
		--muted-dim: #5f7196;

		/* brand + semantic */
		--accent: #0fd3c9;
		--accent-2: #f6a03c;
		--good: #2ecc71;
		--bad: #ff6b6b;

		/* scale */
		--space-1: 4px;
		--space-2: 8px;
		--space-3: 12px;
		--space-4: 16px;
		--space-5: 24px;
		--space-6: 32px;
		--space-7: 48px;

		--radius-sm: 8px;
		--radius-md: 12px;
		--radius-lg: 16px;
		--shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
		--shadow-soft: 0 10px 28px rgba(0, 0, 0, 0.28);

		--font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
		--font-mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
	}

	* { box-sizing: border-box; }

	body {
		margin: 0;
		min-height: 100vh;
		font-family: var(--font-display);
		color: var(--text);
		background: radial-gradient(circle at 15% 20%, rgba(15, 211, 201, 0.12), transparent 30%),
								radial-gradient(circle at 80% 10%, rgba(246, 160, 60, 0.12), transparent 30%),
								radial-gradient(circle at 70% 70%, rgba(15, 211, 201, 0.08), transparent 35%),
								var(--void);
	}

	main {
		max-width: 1100px;
		margin: 40px auto;
		padding: 0 20px 60px;
	}

	.card {
		background: linear-gradient(145deg, var(--card-2), #0a0f1f);
		border: 1px solid var(--stroke);
		border-radius: var(--radius-lg);
		box-shadow: var(--shadow);
		padding: 28px;
	}

	/* ---------- header ---------- */

	.header {
		display: flex;
		flex-direction: column;
		gap: var(--space-4);
		margin-bottom: var(--space-5);
		padding-bottom: var(--space-5);
		border-bottom: 1px solid var(--stroke-soft);
	}

	.header-top {
		display: flex;
		align-items: center;
		justify-content: space-between;
		gap: var(--space-3);
		flex-wrap: wrap;
	}

	.header-main {
		display: flex;
		align-items: flex-end;
		justify-content: space-between;
		gap: var(--space-4);
		flex-wrap: wrap;
	}

	.header-left {
		display: flex;
		flex-direction: column;
		gap: 6px;
	}

	.brand {
		display: inline-flex;
		align-items: center;
		gap: 12px;
		padding: 8px 12px;
		border-radius: var(--radius-md);
		background: var(--surface-1);
		border: 1px solid var(--stroke);
	}

	.brand-text {
		color: #dfe6f5;
		font-weight: 600;
		letter-spacing: 2px;
		font-size: 13px;
	}

	.brand-divider {
		width: 2px;
		height: 20px;
		background: #e24848;
		border-radius: 999px;
	}

	.brand-logo {
		color: #0f253d;
		background: linear-gradient(145deg, #f5f7ff, #dfe6f5);
		padding: 4px 9px;
		border-radius: 7px;
		font-weight: 700;
		letter-spacing: 1px;
		font-size: 13px;
	}

	.sync-status {
		display: inline-flex;
		align-items: center;
		gap: 9px;
		padding: 7px 12px;
		border-radius: 999px;
		border: 1px solid var(--stroke);
		background: var(--surface-1);
		color: var(--muted);
		font-family: var(--font-mono);
		font-size: 12px;
		letter-spacing: 0.3px;
	}

	.sync-status::before {
		content: '';
		width: 8px;
		height: 8px;
		border-radius: 999px;
		background: var(--muted);
		box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.03);
		flex-shrink: 0;
	}

	.sync-status[data-state="online"]::before { background: #33f0c3; box-shadow: 0 0 0 5px rgba(51, 240, 195, 0.14); }
	.sync-status[data-state="syncing"]::before { background: var(--accent-2); box-shadow: 0 0 0 5px rgba(246, 160, 60, 0.14); }
	.sync-status[data-state="error"]::before { background: var(--bad); box-shadow: 0 0 0 5px rgba(255, 107, 107, 0.14); }

	h1 {
		margin: 0;
		font-size: 26px;
		font-weight: 600;
		letter-spacing: 0.2px;
	}

	.muted { color: var(--muted); }

	.header-actions {
		display: flex;
		align-items: center;
		gap: var(--space-3);
		flex-wrap: wrap;
		justify-content: flex-end;
	}

	.autosave-note {
		display: inline-flex;
		align-items: center;
		gap: 8px;
		color: var(--muted-dim);
		font-family: var(--font-mono);
		font-size: 12px;
	}

	.autosave-note::before {
		content: '';
		width: 6px;
		height: 6px;
		border-radius: 999px;
		background: var(--accent);
	}

	.auth-controls {
		display: flex;
		align-items: center;
		gap: 8px;
	}

	.pill {
		display: inline-flex;
		align-items: center;
		gap: 8px;
		padding: 9px 14px;
		border-radius: var(--radius-sm);
		border: 1px dashed var(--stroke);
		color: var(--muted);
		font-size: 13px;
		margin-bottom: var(--space-3);
		text-transform: uppercase;
		letter-spacing: 0.6px;
	}

	/* ---------- tabs ---------- */

	.tabs {
		display: flex;
		gap: var(--space-2);
		margin: 0 0 var(--space-5);
		border-bottom: 1px solid var(--stroke-soft);
	}

	.tab-btn {
		position: relative;
		background: transparent;
		border: none;
		color: var(--muted);
		padding: 10px 4px;
		margin-right: var(--space-5);
		cursor: pointer;
		font-family: inherit;
		font-size: 15px;
		font-weight: 600;
		transition: color 160ms ease;
	}

	.tab-btn::after {
		content: '';
		position: absolute;
		left: 0;
		right: 0;
		bottom: -1px;
		height: 2px;
		background: linear-gradient(90deg, var(--accent), var(--accent-2));
		transform: scaleX(0);
		transform-origin: left;
		transition: transform 180ms ease;
	}

	.tab-btn:hover { color: var(--text); }

	.tab-btn.active {
		color: var(--text);
	}

	.tab-btn.active::after { transform: scaleX(1); }

	.tab-panel { display: none; }
	.tab-panel.active { display: block; }

	/* ---------- forms & buttons ---------- */

	form.add-subject {
		display: grid;
		grid-template-columns: 1fr auto;
		gap: var(--space-3);
		margin-top: var(--space-3);
	}

	.input {
		width: 100%;
		padding: 12px 14px;
		border-radius: var(--radius-sm);
		border: 1px solid var(--stroke);
		background: var(--surface-1);
		color: var(--text);
		font-family: inherit;
		font-size: 15px;
	}

	.input:focus, .btn:focus-visible, .tab-btn:focus-visible, .history-toggle:focus-visible {
		outline: 2px solid var(--accent);
		outline-offset: 2px;
	}

	.btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		gap: 8px;
		border: none;
		cursor: pointer;
		padding: 11px 16px;
		border-radius: var(--radius-sm);
		font-family: inherit;
		font-weight: 600;
		font-size: 14px;
		letter-spacing: 0.2px;
		transition: transform 120ms ease, box-shadow 180ms ease, background 200ms ease, opacity 120ms ease;
	}

	.btn svg { width: 16px; height: 16px; flex-shrink: 0; }

	.btn-primary {
		background: linear-gradient(135deg, var(--accent), #0aa59d);
		color: #041017;
		box-shadow: 0 8px 24px rgba(15, 211, 201, 0.25);
	}

	.btn-secondary {
		background: var(--surface-2);
		color: var(--text);
		border: 1px solid var(--stroke);
	}

	.btn-ghost {
		background: var(--surface-1);
		border: 1px dashed var(--stroke);
		box-shadow: none;
	}

	.btn-approve {
		background: linear-gradient(135deg, var(--good), #1f9d57);
		color: #04220f;
		box-shadow: 0 8px 20px rgba(46, 204, 113, 0.22);
	}

	.btn-reject {
		background: linear-gradient(135deg, var(--bad), #d94343);
		color: #2a0505;
		box-shadow: 0 8px 20px rgba(255, 107, 107, 0.22);
	}

	.btn:hover { transform: translateY(-1px); }
	.btn:active { transform: translateY(0); }
	.btn:disabled { opacity: 0.55; cursor: default; transform: none; }

	/* ---------- subjects ---------- */

	.subjects {
		display: grid;
		gap: var(--space-4);
		margin-top: var(--space-5);
	}

	.subject {
		border: 1px solid var(--stroke);
		border-radius: var(--radius-lg);
		padding: 20px;
		background: var(--surface-1);
		position: relative;
		overflow: hidden;
		transition: border-color 160ms ease;
	}

	.subject::before {
		content: '';
		position: absolute;
		inset: 0;
		pointer-events: none;
		background: radial-gradient(400px circle at var(--glow-x, 0%) var(--glow-y, 0%), rgba(15, 211, 201, 0.08), transparent 50%);
		transition: opacity 180ms ease;
		opacity: 0;
	}

	.subject:hover { border-color: rgba(15, 211, 201, 0.35); }
	.subject:hover::before { opacity: 1; }

	.subject-header {
		display: flex;
		align-items: center;
		gap: var(--space-3);
		justify-content: space-between;
		flex-wrap: wrap;
		position: relative;
	}

	.subject h2 {
		margin: 0;
		font-size: 19px;
		font-weight: 600;
		display: flex;
		align-items: center;
		gap: 10px;
	}

	.badge {
		padding: 5px 10px;
		border-radius: var(--radius-sm);
		background: rgba(15, 211, 201, 0.12);
		color: #8bf1eb;
		border: 1px solid rgba(15, 211, 201, 0.4);
		font-family: var(--font-mono);
		font-size: 12px;
		font-weight: 500;
	}

	.progress {
		width: 180px;
		height: 6px;
		border-radius: 999px;
		background: #0a101f;
		border: 1px solid var(--stroke);
		overflow: hidden;
		flex-shrink: 0;
	}

	.progress span {
		display: block;
		height: 100%;
		width: 0;
		background: linear-gradient(90deg, var(--accent), var(--accent-2));
		transition: width 180ms ease;
	}

	.subject-actions {
		display: flex;
		align-items: center;
		gap: 8px;
		flex-wrap: wrap;
		justify-content: flex-end;
	}

	.subject-actions .btn {
		padding: 8px 12px;
		font-size: 13px;
	}

	/* ---------- topics (active checklist) ---------- */

	.topics { list-style: none; padding: 0; margin: var(--space-4) 0 var(--space-2); display: grid; gap: 8px; }

	.topic {
		display: grid;
		grid-template-columns: 1fr auto;
		gap: 10px;
		align-items: center;
		padding: 12px 14px;
		border-radius: var(--radius-sm);
		background: var(--card);
		border: 1px solid var(--stroke-soft);
		transition: border-color 160ms ease, background 160ms ease;
	}

	.topic:hover { border-color: var(--stroke); }

	.topic label {
		display: flex;
		align-items: center;
		gap: 10px;
		cursor: pointer;
		color: #e5ecff;
	}

	.topic input[type="checkbox"] {
		width: 18px;
		height: 18px;
		accent-color: var(--accent);
		cursor: pointer;
		flex-shrink: 0;
	}

	.topic.done { background: transparent; }
	.topic.done label { color: var(--muted); text-decoration: line-through; }

	.topic-actions {
		display: flex;
		gap: 6px;
		justify-content: flex-end;
		flex-wrap: wrap;
	}

	.topic-actions .btn,
	.topic-image-actions .btn {
		padding: 8px 11px;
		font-size: 13px;
	}

	.topic-image {
		grid-column: 1 / -1;
		display: flex;
		align-items: center;
		gap: 12px;
		margin-top: 4px;
		padding: 10px 12px;
		border-radius: var(--radius-sm);
		border: 1px solid var(--stroke-soft);
		background: var(--surface-1);
	}

	.topic-image img {
		width: 72px;
		height: 72px;
		object-fit: cover;
		border-radius: var(--radius-sm);
		border: 1px solid var(--stroke);
	}

	.topic-image-actions {
		display: flex;
		gap: 8px;
		flex-wrap: wrap;
	}

	.add-topic {
		display: grid;
		grid-template-columns: 1fr auto;
		gap: 10px;
		margin-top: 10px;
	}

	.empty {
		padding: var(--space-4);
		color: var(--muted);
		border: 1px dashed var(--stroke);
		border-radius: var(--radius-md);
		background: var(--surface-1);
		text-align: center;
	}

	/* ---------- history ---------- */

	.history-list { display: grid; gap: var(--space-3); }

	.history-entry {
		border: 1px solid var(--stroke);
		border-radius: var(--radius-lg);
		padding: 16px;
		background: var(--surface-1);
		box-shadow: var(--shadow-soft);
	}

	.history-head {
		display: flex;
		justify-content: flex-start;
		align-items: center;
		gap: var(--space-3);
		flex-wrap: wrap;
	}

	.history-head h3 {
		margin: 0;
		font-size: 16px;
		font-weight: 600;
		cursor: pointer;
	}

	.history-head .muted {
		font-family: var(--font-mono);
		font-size: 12px;
		cursor: pointer;
	}

	.history-head .btn-secondary { margin-left: auto; }

	h3 { margin: 0; font-size: 18px; }

	.history-subjects { display: grid; gap: var(--space-3); margin-top: var(--space-3); }

	.history-subject {
		border: 1px solid var(--stroke-soft);
		border-radius: var(--radius-md);
		padding: 12px 14px;
		background: var(--card);
	}

	.history-subject-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: var(--space-2); }
	.history-subject h4 { margin: 0; font-size: 15px; font-weight: 600; }

	.history-topics { list-style: none; padding-left: 0; margin: 0; display: grid; gap: 8px; }

	.history-topics li {
		padding: 10px 12px;
		border-radius: var(--radius-sm);
		background: var(--surface-1);
		border: 1px solid transparent;
		display: grid;
		gap: 8px;
	}

	.history-topics li.done { color: var(--muted); }
	.history-topics li.done .history-topic-row > span:first-child { text-decoration: line-through; }

	.history-topic-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }

	.history-meta {
		border: 1px solid rgba(246, 160, 60, 0.35);
		background: rgba(246, 160, 60, 0.08);
		border-radius: var(--radius-md);
		padding: 12px 14px;
		margin-bottom: var(--space-3);
	}

	.history-meta p { margin: 0 0 8px; color: #ffd9a8; font-size: 14px; }
	.history-meta p:last-child { margin-bottom: 0; }

	.history-pending {
		list-style: none;
		margin: 0;
		padding: 0;
		display: grid;
		gap: 4px;
	}

	.history-pending li {
		font-family: var(--font-mono);
		font-size: 12px;
		color: #ffd9a8;
		padding-left: 14px;
		position: relative;
	}

	.history-pending li::before {
		content: '–';
		position: absolute;
		left: 0;
	}

	.history-empty {
		padding: var(--space-4);
		color: var(--muted);
		border: 1px dashed var(--stroke);
		border-radius: var(--radius-md);
		background: var(--surface-1);
		margin-bottom: var(--space-3);
		text-align: center;
	}

	.history-toggle {
		border: none;
		background: transparent;
		color: var(--accent);
		cursor: pointer;
		font-weight: 600;
		font-size: 13px;
		padding: 6px 10px;
		border-radius: var(--radius-sm);
		display: inline-flex;
		align-items: center;
		gap: 6px;
	}

	.history-toggle::after {
		content: '›';
		display: inline-block;
		font-size: 16px;
		transform: rotate(90deg);
		transition: transform 160ms ease;
	}

	.history-entry.open .history-toggle::after { transform: rotate(-90deg); }

	.history-toggle:hover { background: var(--surface-2); }
	.history-details { display: none; margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px solid var(--stroke-soft); }
	.history-entry.open .history-details { display: block; }

	/* validation "stamp" — the signature element: an ink-stamped approval/rejection mark */
	.validation-box { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

	.validation-status {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		padding: 5px 10px;
		border-radius: var(--radius-sm);
		font-family: var(--font-mono);
		font-size: 11px;
		font-weight: 600;
		text-transform: uppercase;
		letter-spacing: 1px;
		border: 1.5px solid;
		transform: rotate(-2deg);
		box-shadow: inset 0 0 0 1px currentColor;
	}

	.validation-status.approved {
		background: rgba(46, 204, 113, 0.1);
		color: var(--good);
		border-color: rgba(46, 204, 113, 0.55);
	}

	.validation-status.rejected {
		background: rgba(255, 107, 107, 0.1);
		color: var(--bad);
		border-color: rgba(255, 107, 107, 0.55);
	}

	/* ---------- auth panel ---------- */

	.auth-panel {
		display: none;
		position: fixed;
		top: 90px;
		left: 50%;
		transform: translateX(-50%);
		z-index: 999;
		gap: var(--space-2);
		width: min(520px, calc(100% - 40px));
		padding: var(--space-4);
		border: 1px solid var(--stroke);
		border-radius: var(--radius-md);
		background: var(--card);
		box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
	}

	.auth-panel.open { display: grid; }

	.auth-panel form {
		display: grid;
		grid-template-columns: 1fr 1fr auto;
		gap: 10px;
	}

	.auth-panel small { color: var(--muted); }

	@media (max-width: 640px) {
		.auth-panel form { grid-template-columns: 1fr; }
	}

	/* ---------- image modal ---------- */

	.image-modal {
		position: fixed;
		inset: 0;
		background: rgba(0, 0, 0, 0.6);
		display: none;
		align-items: center;
		justify-content: center;
		padding: 20px;
		z-index: 999;
	}

	.image-modal.active { display: flex; }

	.image-modal-content {
		background: var(--card);
		border: 1px solid var(--stroke);
		border-radius: var(--radius-lg);
		box-shadow: var(--shadow);
		max-width: min(90vw, 900px);
		max-height: 90vh;
		padding: 12px;
		display: grid;
		gap: 10px;
	}

	.image-modal-content img { max-width: 100%; max-height: 80vh; border-radius: var(--radius-sm); border: 1px solid var(--stroke); object-fit: contain; }

	.image-modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

	/* ---------- responsive ---------- */

	@media (max-width: 640px) {
		main { margin: 20px auto; padding: 0 12px 40px; }
		.card { padding: 18px; }
		.header-main { align-items: flex-start; }
		.header-actions { width: 100%; justify-content: flex-start; }
		form.add-subject { grid-template-columns: 1fr; }
		.subject-header { flex-direction: column; align-items: flex-start; }
		.subject-actions { justify-content: flex-start; width: 100%; }
		.progress { width: 100%; }
		.topic { grid-template-columns: 1fr; }
		.topic-actions { justify-content: flex-start; }
		.add-topic { grid-template-columns: 1fr; }
		.history-head .btn-secondary { margin-left: 0; }
	}
</style>
</head>
<body>
	<main>
		<div class="card">
			<div class="header">
				<div class="header-top">
					<div class="brand" aria-label="Grupo TBX">
						<span class="brand-text">GRUPO</span>
						<span class="brand-divider" aria-hidden="true"></span>
						<span class="brand-logo">TBX</span>
					</div>
					<div class="sync-status" id="sync-status" data-state="syncing">Conectando...</div>
				</div>
				<div class="header-main">
					<div class="header-left">
						<h1>Checklist por Assunto</h1>
						<div class="muted">Organize itens por categoria e acompanhe o progresso.</div>
					</div>
					<div class="header-actions">
						<div class="autosave-note">Salvamento automático</div>
						<div class="auth-controls">
							<button class="btn btn-secondary" id="login-btn" type="button">
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
								Login
							</button>
							<button class="btn btn-secondary btn-ghost" id="logout-btn" type="button">
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
								Sair
							</button>
						</div>
						<button class="btn btn-primary" id="save-day" type="button">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 6L9 17l-5-5"/></svg>
							Salvar checklist do dia
						</button>
					</div>
				</div>
			</div>

			<div class="tabs" role="tablist">
				<button class="tab-btn active" data-tab="current" type="button">Checklist</button>
				<button class="tab-btn" data-tab="history" type="button">Histórico</button>
			</div>

			<div class="tab-panel active" data-panel="current">
				<div id="create-section">
					<div class="pill">Adicionar novo assunto</div>
					<form class="add-subject" id="subject-form">
						<input class="input" name="subject" placeholder="Ex.: Viagem, Reunião, Compras" required>
						<button class="btn btn-primary" type="submit">Criar assunto</button>
					</form>
				</div>

				<div class="subjects" id="subjects"></div>

				<input type="file" id="image-input" accept="image/*" capture="environment" hidden>
			</div>

			<div class="tab-panel" data-panel="history">
				<div class="history-empty" id="history-empty">Nenhum histórico salvo ainda.</div>
				<div class="history-list" id="history-list"></div>
			</div>
		</div>
	</main>

	<div class="auth-panel" id="login-panel">
		<div><strong>Login</strong> <small>(necessário para criar assunto)</small></div>
		<form id="login-form">
			<input class="input" id="login-user" name="user" placeholder="Usuário" autocomplete="username">
			<input class="input" id="login-pass" name="pass" placeholder="Senha" type="password" autocomplete="current-password">
			<button class="btn btn-secondary" type="submit">Entrar</button>
		</form>
		<div id="login-status" class="muted">Deslogado</div>
	</div>

	<div class="image-modal" id="image-modal" aria-modal="true" role="dialog">
		<div class="image-modal-content">
			<div class="image-modal-actions">
				<button class="btn btn-secondary" type="button" id="image-modal-close">Fechar</button>
			</div>
			<img id="image-modal-img" alt="Imagem anexada">
		</div>
	</div>

	<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
	<script src="app.js?v=2"></script>
</body>
</html>
